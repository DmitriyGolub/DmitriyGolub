<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .t { font-family: 'Courier New', monospace; }
    .fade { animation: fi 0.4s 0.1s both; }
    @keyframes fi { from{opacity:0} to{opacity:1} }

    .bar { height:6px; rx:3; animation-fill-mode:both; animation-iteration-count:1; }

    .b1  { animation: fill1  1.4s 0.2s ease-out both 1; }
    .b2  { animation: fill2  1.4s 0.4s ease-out both 1; }
    .b3  { animation: fill3  1.4s 0.6s ease-out both 1; }
    .b4  { animation: fill4  1.4s 0.8s ease-out both 1; }
    .b5  { animation: fill5  1.4s 1.0s ease-out both 1; }
    .b6  { animation: fill6  1.4s 1.2s ease-out both 1; }
    .b7  { animation: fill7  1.4s 1.4s ease-out both 1; }
    .b8  { animation: fill8  1.4s 1.6s ease-out both 1; }
    .b9  { animation: fill9  1.4s 1.8s ease-out both 1; }
    .b10 { animation: fill10 1.4s 2.0s ease-out both 1; }
    .b11 { animation: fill11 1.4s 2.2s ease-out both 1; }

    @keyframes fill1  { from{width:0} to{width:161px} }
    @keyframes fill2  { from{width:0} to{width:161px} }
    @keyframes fill3  { from{width:0} to{width:184px} }
    @keyframes fill4  { from{width:0} to{width:161px} }
    @keyframes fill5  { from{width:0} to{width:207px} }
    @keyframes fill6  { from{width:0} to{width:207px} }
    @keyframes fill7  { from{width:0} to{width:207px} }
    @keyframes fill8  { from{width:0} to{width:207px} }
    @keyframes fill9  { from{width:0} to{width:184px} }
    @keyframes fill10 { from{width:0} to{width:207px} }
    @keyframes fill11 { from{width:0} to{width:189px} }
  </style>
</defs>

<rect width="800" height="300" rx="10" fill="#0d0b16"/>
