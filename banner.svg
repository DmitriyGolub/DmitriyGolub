    .blink{animation:blink 5.5s ease-in-out infinite}
    @keyframes blink{0%,84%,90%,100%{transform:scaleY(1)}87%{transform:scaleY(0.05)}}
    .cur{animation:cur 1s step-end infinite}
    @keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
    .tw{animation:twk 2.4s ease-in-out infinite}
    .tw2{animation:twk 3.3s ease-in-out infinite}
    .tw3{animation:twk 1.9s ease-in-out infinite}
    .tw4{animation:twk 2.8s ease-in-out infinite}
    .tw5{animation:twk 3.6s ease-in-out infinite}
    .tw6{animation:twk 2.1s ease-in-out infinite}
    @keyframes twk{0%,100%{opacity:0.08}50%{opacity:0.85}}
    .stm{animation:stm 2.4s ease-in-out infinite}
    .stm2{animation:stm 3.2s ease-in-out infinite}
    @keyframes stm{0%,100%{opacity:0.2;transform:translateY(0)}50%{opacity:0;transform:translateY(-8px)}}
  </style>
